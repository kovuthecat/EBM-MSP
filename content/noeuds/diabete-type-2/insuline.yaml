  auteur: "référent DT2 (Thibault) + Opus"
  statut: brouillon
  version: "0.1"
  changelog:
    - date: "2026-07-24"
      auteur: "Opus + référent"
      resume: >-
        Distillation initiale (BROUILLON v0.1) depuis le dossier de preuve E-insuline.md (5 agents A × OpenEvidence
        2ᵉ passe × red-team B1/B2/B3, PMID/DOI vérifiés et corrigés contre source primaire — §5b). Nœud
        multi-options routé par situation_insuline (4 situations, 11 options) : naïf (GLP-1 d'abord → initier
        basale → 2ᵉ génération), basale seule (corriger l'hypo → ne pas sur-titrer → titrer), basal-plus (GLP-1
        → bolus au repas principal → prémix dégradé), basal-bolus (désintensifier → optimiser). MCG en deux axes
        (contrôle = interprétation/alertes ; sécurité = gate). Doses calculées (poids + doses actuelles).
        Cibles de MCG relâchées sur terrain fragile (cohérence nœud A). Arbitrages référent §8-1→8-7 tranchés.
        RESTE avant valide : validation clinique du référent option par option, puis vérification d'encodage
        bi-agents (étape 8). Câblage formulaire = P3.
