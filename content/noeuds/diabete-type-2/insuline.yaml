  medicalement_geek:
    synthese: >-
      Ligne EBM francophone (ebmfrance/Duodecim, Médicalement Geek/DragiWebdo) : basale + oraux/GLP-1 = schéma
      de choix ; prandial et prémélangé hors 1ʳᵉ intention ; GLP-1 avant le bolus ; vigilance sur le
      surtraitement du sujet âgé (aucune métrique — HbA1c ni MCG — ne prédit fiablement le risque d'hypoglycémie).
    lien: "https://www.ebmfrance.net/Guidelines/Details/ebm00491"
  prescrire:
    synthese: >-
      Insuline en AJOUT lorsque l'HbA1c est très élevée ou si éviter la prise de poids n'est pas prioritaire ;
      le GLP-1 (sémaglutide, dulaglutide) est le plus souvent préféré AVANT l'insuline. Effets indésirables :
      hypoglycémie, prise de poids, aggravation d'une rétinopathie en cas de baisse rapide de l'HbA1c. (Résumé
      — droit d'auteur ; réf. prescrire-dt2.md P1/P3/P5/P8. NB : Prescrire ne traite pas la hiérarchie NPH /
      analogues de 2ᵉ génération dans ces sources.)
  reco_officielle:
    source: >-
      SFD 2025 (Darmon P et al., Médecine des maladies Métaboliques 2025;19(8):630-662) — reco française de
      référence affichée ; HAS 2024 (« Stratégie thérapeutique du patient vivant avec un DT2 ») ; ADA Standards
      of Care 2026 (chap. 7 Technologie & 9 Traitement pharmacologique) ; ADA/EASD 2022 (Davies, PMID 36148880) ;
      AACE 2022/2026. Position d'experts MCG en médecine générale : Joubert M et al. 2025 (Méd. Mal. Métab. 19:331-347).
    position: >-
      Consensus : insuline basale ajoutée aux antidiabétiques ; GLP-1 préféré comme premier injectable et avant
      le bolus (SFD 2025 Avis 19, ADA 2026 rec 9.21) ; analogues de 2ᵉ génération si risque d'hypoglycémie
      (SFD 2025 Avis 18 bis) ; désintensification du sujet âgé (SFD 2025 Avis 21, HAS 2024 R.103) ; MCG
      recommandée et remboursée chez le patient traité par insuline (SFD 2025 Avis 23, ADA 2026 rec 7.15 grade A),
      avec les cibles de Time in Range de Battelino 2019.
    divergence: true
    explication: >-
      Deux frictions officielles : (1) la HAS 2024 (R.88, grade accord d'experts) place l'insuline prémélangée
      à parité avec le basal-bolus et reste muette sur la préférence 2ᵉ génération et sur « le GLP-1 avant le
      bolus », là où ebmfrance et la SFD 2025 l'écartent ou l'énoncent explicitement ; (2) sur la MCG / le Time
      in Range, un axe SFD 2025 / ADA 2026 technophile (MCG grade A, délivrance automatisée d'insuline désormais
      proposée aussi en DT2, avec d'importants conflits d'intérêt avec les fabricants de dispositifs) s'oppose à
      une HAS réservée (MCG « encouragée », sans cible de TIR) et à la position critique (Prescrire, Médicalement
      Geek : les cibles de TIR sont un consensus / un substitut, aucune métrique ne prédit fiablement
      l'hypoglycémie, d'où un risque de surtraitement guidé par la technologie). L'outil affiche la reco
      française (SFD 2025, convergente avec l'EBM sur l'essentiel) et signale ces divergences ; il ne revendique
      jamais de bénéfice cardiovasculaire pour l'insuline (ORIGIN neutre).
incertitudes:
  - "MCG : les cibles (TIR > 70 %, etc.) sont un consensus d'experts (Battelino 2019), pas un critère dur ; le lien TIR-complications est observationnel (Beck, ré-analyse du DCCT en DT1 ; Lu, cohorte T2D) ; le bénéfice de la MCG en DT2 porte sur des substituts (HbA1c, TIR), sans preuve sur les complications dures ni la mortalité (Jancev)."
  - "Bénéfice microvasculaire de l'insuline = extrapolé du contrôle glycémique (UKPDS), non démontré par un essai dédié à l'insuline sur critère dur."
  - "Seuil d'over-basalisation de 0,5 U/kg = repère (SFD / Médicalement Geek), non validé par un essai — à confirmer ; modélisé comme dérivé affiché, pas comme gate EBM dur."
  - "2ᵉ génération : hypoglycémie SÉVÈRE démontrée pour degludec vs glargine U100 seulement (DEVOTE) ; pour la 1ʳᵉ génération vs NPH, elle n'est pas significative (Cochrane 2020) ; pas de supériorité d'un analogue de 2ᵉ génération sur l'autre (BRIGHT, CONCLUDE)."
  - "Associations fixes (IDegLira, iGlarLixi) : bénéfice substitutif, aucun essai de morbi-mortalité cardiovasculaire dédié."
  - "Câblage formulaire (P3) : dérivés cible_atteinte / gaj_a_cible / over_basalisation / terrain_fragile, calcul des doses (poids + doses actuelles), tooltips de lecture de l'AGP par profil, et la variable hypo_severe_recurrente restent à câbler."
  - "Intégration inter-nœuds : HbA1c_cible provient du nœud A et terrain_fragile reprend ses déclencheurs de relaxation — cohérence à maintenir."
