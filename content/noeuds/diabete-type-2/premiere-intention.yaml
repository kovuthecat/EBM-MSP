  changelog:
    - date: "2026-07-23"
      auteur: "référent DT2 + Opus"
      resume: >-
        Encodage initial depuis le dossier de preuve (bi-agents + OpenEvidence + curation HAS / Médicalement
        Geek / SFD 2025 + Prescrire, avec passes de vérification / triangulation). Nœud multi-options :
        gate insuline (catabolisme), iSGLT2 (IC/rénal), AR GLP-1 (athérome/obésité), tirzépatide, association,
        metformine seule par défaut. Priorité par ordre des options ; contre-indications affichées.
        Tous les arbitrages validés par le référent (effet-classe par molécule = D12, gate insuline,
        argumentation négative SU/gliptines, priorité par critère dominant).
