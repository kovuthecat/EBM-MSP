  medicalement_geek:
    synthese: >-
      Approuve iSGLT2/GLP-1 pilotés par les comorbidités ; critique la metformine en 1re intention
      (grade C « malgré l'absence de bénéfice clinique » démontré) et rejette gliptines et sulfamides ;
      réserve pratique sur le remboursement en monothérapie.
    lien: "https://www.medicalement-geek.com/2023/01/les-traitements-du-diabete-formule-all.html"
  prescrire:
    synthese: >-
      Quand la metformine ne suffit pas, ajouter un AR GLP-1 (sémaglutide/dulaglutide 1er choix) est le
      plus souvent le premier choix, surtout si risque CV élevé ; dapagliflozine (voire empagliflozine)
      si insuffisance cardiaque ou insuffisance rénale modérée avec protéinurie. Bénéfice des GLP-1 jugé
      « peut-être » et fragile (LEADER), balance grevée d'effets indésirables ; tirzépatide non supérieur
      au dulaglutide (SURPASS-CVOT) ; gliptines et pioglitazone « à écarter ». (Résumé — droit d'auteur ;
      réf. Rev Prescrire 2023;43(478):595-605 ; Premiers Choix févr 2026 ; 2026;46(512):429 et 455 ;
      2025;45(500):455. Synthèses : docs/decision/sources/prescrire-dt2.md.)
  reco_officielle:
    source: "SFD 2025 (Prise de position, Med Mal Metab 2025;19:630-662) ; HAS 2024 (Stratégie thérapeutique du DT2, grade A) ; ADA/EASD 2022 ; KDIGO 2022"
    position: >-
      Sur socle metformine + mode de vie : en cas de maladie CV établie, insuffisance cardiaque ou maladie
      rénale chronique, prescrire d'emblée un iSGLT2 ou un AR GLP-1 (ou tirzépatide) à bénéfice prouvé, quel
      que soit l'HbA1c ; en cas d'obésité (IMC ≥ 30) / MASLD-MASH, un AR GLP-1 ou tirzépatide.
    divergence: true
    explication: >-
      Convergence forte sur le CIBLAGE par comorbidité (IC/MRC/MCV/obésité). Divergences : (1) Prescrire
      est plus prudent — bénéfice des GLP-1 « peut-être »/fragile, effets indésirables mis en avant, et
      écarte gliptines + pioglitazone (là où la SFD les garde en place résiduelle) ; (2) le « bénéfice
      cardiovasculaire » des iSGLT2 recouvre surtout de l'insuffisance cardiaque et du rénal, PAS de
      l'athérothrombose ; en prévention primaire à bas risque sans IC ni MRC, le bénéfice dur est faible/nul.
incertitudes:
  - "Priorité iSGLT2 vs AR GLP-1 quand les deux sont indiqués : pas d'ECR tête-à-tête (méta-analyses en réseau)."
  - "Bénéfice de l'association iSGLT2 + AR GLP-1 : observationnel + sous-groupes (PRECIDENTD en cours)."
  - "Effet-classe vs molécule : mortalité (iSGLT2, surtout empagliflozine) ; signal d'IC (gliptines, surtout saxagliptine)."
  - "Tirzépatide : pas de CVOT contre placebo ; bénéfice CV par non-infériorité au dulaglutide seulement."
  - "Insuline initiale « rémission » : critère intermédiaire, non durable, peu transposable au patient européen."
  - "Composite cardio-rénal élargi de SURPASS-CVOT : libellé / IC à confirmer sur le texte intégral (NEJM)."
  - "Priorité par ordre fixe (multi-options) : quand iSGLT2 et AR GLP-1 co-déclenchent, la préférence par critère dominant (IC/rein → iSGLT2 ; athérome/obésité → AR GLP-1) est portée par les avantages / l'argumentaire, pas par un rang — un champ priorite conditionnel est une extension P2 (D10)."
  - "Décompensation aiguë (cétose / hyperosmolarité) exclue par population_cible ; variables dédiées decompensation / cetose + évaluation des contre_indications comme exclusions dures par le moteur = extension P2."
