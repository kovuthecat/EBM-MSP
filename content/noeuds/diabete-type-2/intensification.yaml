  medicalement_geek:
    synthese: >-
      Approuve l'intensification pilotée par les comorbidités (iSGLT2/AR GLP-1) et la relégation des sulfamides
      et des gliptines (aucun bénéfice d'organe démontré) ; anti-sur-traitement, endosse la désintensification
      chez le sujet âgé fragile.
    lien: "https://www.medicalement-geek.com/2023/01/les-traitements-du-diabete-formule-all.html"
  prescrire:
    synthese: >-
      Quand la metformine ne suffit pas, ajouter un AR GLP-1 (sémaglutide/dulaglutide 1er choix) est le plus
      souvent le premier choix, surtout si risque CV élevé ; dapagliflozine (voire empagliflozine) si
      insuffisance cardiaque ou insuffisance rénale modérée avec protéinurie. Gliptines et pioglitazone « plus
      dangereuses qu'utiles, à écarter quelle que soit la situation ». Sulfamides : « gare aux hypoglycémies ».
      Espérance de vie faible → ne pas ajouter de médicament tant que HbA1c ≤ 8,5-9 %. (Résumé — droit d'auteur ;
      réf. Rev Prescrire 2023;43(478):595-605 ; synthèses : docs/decision/sources/prescrire-dt2.md.)
  reco_officielle:
    source: "HAS 2024 (Stratégie thérapeutique du DT2, R.45-R.105) ; SFD 2025 (Med Mal Metab 2025;19:630-662, Avis 3/5/5bis/6/11-15) ; ADA Standards of Care 2026 ; KDIGO 2022 ; RCP metformine (Base de données publique des médicaments, ANSM)"
    position: >-
      Intensifier en ajoutant un iSGLT2 (IC / maladie rénale, HAS R.65/R.66 grade A) ou un AR GLP-1 (maladie CV
      établie R.64 grade A ; obésité R.71), indépendamment de l'HbA1c ; sulfamides plus la stratégie
      préférentielle (R.69) ; ne pas associer GLP-1 et iDPP4 (R.80 ; ADA 2026 §9 ; KDIGO 2022 PP 4.2.3 :
      « stopping the gliptin ») ; chez le sujet âgé sur-traité, éviter le surtraitement et proposer une
      désintensification (HAS R.102/R.103/R.105 ; SFD Avis 5 bis ; ADA 13.14a-d, en maintenant iSGLT2/AR GLP-1).
      Sécurité rénale de la metformine (RCP/ANSM, adaptation à la fonction rénale — HAS R.49) : dose maximale
      3 g/j si DFG ≥ 60, 2 g/j si 45-59, 1 g/j si 30-44, CONTRE-INDIQUÉE si DFG < 30 (risque d'acidose lactique).
    divergence: true
    explication: >-
      Convergence forte sur la direction (relégation des sulfamides/gliptines, priorité iSGLT2/AR GLP-1 pilotée
      par la comorbidité, non-association gliptine+GLP-1, désintensification du sujet âgé). Divergences : (1)
      Prescrire écarte l'iDPP4 quelle que soit la situation, là où HAS/SFD le gardent en place résiduelle ; (2)
      granularité EBM — l'outil ne durcit pas les gains hypoglycémie/poids/HbA1c en bénéfice cardio-rénal, et
      nomme la molécule quand la protection est molécule-spécifique. L'association iSGLT2 + AR GLP-1 n'est pas
      présentée comme une synergie prouvée (bénéfice dur additif non démontré — NMA d'ECR neutre sur le MACE) :
      elle se justifie par la coexistence de deux indications distinctes (séquençage).
incertitudes:
  - "Bénéfice dur de la substitution elle-même : jamais testé en switch (argument indirect = valeur comparée des classes) ; le sera probablement jamais (pas d'équipoise pour re-tester le sulfamide / la gliptine)."
  - "Additivité iSGLT2 + AR GLP-1 sur critères durs : non démontrée (sous-groupes sous-puissants + cohortes biaisées) ; additivité glycémique/pondérale acquise ; essai PRECIDENTD en cours."
  - "Désintensification : niveau de preuve faible / accord d'experts ; pas d'ECR de devenirs durs (OMED2 en cours)."
  - "Repérage du sur-traitement : l'HbA1c seule est insuffisante (HYPOAGE) ; d'où le critère hypoglycemie_recente / chute en complément (dérivé fourni par le formulaire)."
  - "Critères dérivés cible_atteinte / sur_traitement calculés par le formulaire (HbA1c actuelle vs cible du nœud A) : le DSL ne compare pas deux variables ; le chaînage inter-nœuds A→C reste hors moteur (P3)."
