meta:
  date_revue: "2026-07-23"
  auteur: "référent DT2"
  statut: valide
  version: "1.0"
  changelog:
    - date: "2026-07-23"
      auteur: "référent DT2 + Opus"
      resume: >-
        Encodage initial depuis le dossier de preuve (bi-agents A/B + OpenEvidence + lecture directe HAS 2024
        & SFD 2025 + Prescrire, avec triangulation). Nœud multi-options à 3 leviers : désintensification
        (priorité 1) ; introduction iSGLT2 / AR GLP-1 et remplacement de la gliptine (priorité 2) ;
        remplacement du sulfamide (priorité 3) ; intensification glycémique résiduelle (priorité 4) ; poursuite
        par défaut. Garde-fous durs : iSGLT2 exclu si DFG < 20 ; non-association gliptine+GLP-1 par construction
        (switch) ; désintensification jamais d'un agent protecteur. Arbitrages validés référent : optimisation
        à objectif atteint (oui), désintensification (oui) + critère hypoglycemie_recente/chute, association =
        séquençage. Critères dérivés cible_atteinte / sur_traitement calculés par le formulaire (D3).
        Vérification d'encodage bi-agents (A fidélité + B red-team sur le moteur réel, 0 finding HAUTE, tous les
        garde-fous de sécurité confirmés) : ajout d'une option « arrêter la gliptine redondante » (combo
        gliptine+GLP-1 déjà en place — B/F3) ; garde `hypoglycemie_recente == false` sur le remplacement du
        sulfamide et l'intensification glycémique (exclusivité avec la désintensification — B/F1-F2) ; note de
        sécurité saxagliptine + insuffisance cardiaque (arrêt, signal SAVOR — A/M1) ; ajout R.66.
        Ajout (demande référent) de la SÉCURITÉ RÉNALE DE LA METFORMINE, sourcée sur le RCP/ANSM : 2 options
        actives — arrêt si DFG < 30 (contre-indication, priorité 1) et réduction de la dose maximale si DFG
        30-59 (2 g/j à 45-59, 1 g/j à 30-44, priorité 2) — piloté dans le nœud C car CI de sécurité.
