# Nœud H « RHD / perte de poids / rémission » — brouillon v0.1 (2026-07-24).
# Autorité : docs/decision/noeuds/H-rhd.md (dossier de preuve : 5 agents A + red-team B1→B5 + OpenEvidence
# OE-H1→H5 + red-team primaire des essais OE + lecture directe HAS 2024 / SFD 2025 / ebmfrance / Prescrire).
# Ne pas modifier les valeurs cliniques hors workflow veille → algorithme (DECISIONS.md D5).
#
# RECADRAGE STRUCTURANT (référent 2026-07-24) : en MÉDECINE GÉNÉRALE, H est un OUTIL D'AIDE À LA RECOMMANDATION.
# Le MG recommande / informe / oriente — il ne DÉLIVRE PAS de programme intensif (soins spécialisés/coordonnés).
# Les options sont des RECOMMANDATIONS présentant les BÉNÉFICES ATTENDUS, pas des prestations.
#
# NŒUD MULTI-OPTIONS (D10/D11) : recommandations empilées, non concurrentes.
#  - SOCLE MHD = recommandation TOUJOURS affichée (D16, `conditions: ["toujours"]`, priorite 0).
#  - PERTE DE POIDS RENFORCÉE (visée rémission) = ajoutée si IMC >= 27 (priorite 1). §8-2 : PAS de gate sur
#    l'ancienneté du diabète (Kanbour 2025 : après ajustement sur la perte de poids, l'ancienneté n'est plus
#    un prédicteur indépendant) — l'ancienneté module le MESSAGE de probabilité de rémission via les `alertes`.
#  - CHIRURGIE MÉTABOLIQUE = §8-1 : NOTE conditionnée par l'IMC (alerte D15 « y penser »), PAS une option.
#  - Objectif de perte de poids (§8-3) = PAS un critère d'entrée : 2 paliers portés par l'`effet_attendu`
#    (≥ 5-10 % socle / ≥ 10-15 % programme rémission).
#  - MODULATEURS (§8-4, jamais de gating dur) via `alertes` : motivation, capacite_activite, et la « marge de
#    manœuvre » (alimentation_equilibree, activite_physique_reguliere : déjà équilibré/actif → « maintenir »,
#    bénéfice additionnel moindre).
#  - VOIX (§8-6) : on garde l'option EBM (rémission par la DIÈTE, DiRECT/DIADEM-1) et on SIGNALE la divergence
#    avec la SFD 2025 (qui confine la rémission à la chirurgie). Jamais de promesse de survie/CV (Look AHEAD).
#  - `traitements_en_cours` (liste, D13) sert à l'alerte hypoglycémie (§8-5) sous insuline/sulfamide/glinide.
id: rhd
domaine: diabete-type-2
titre: "Recommander les mesures hygiéno-diététiques, la perte de poids et la rémission (aide à la recommandation en soins premiers)"
population_cible: >-
  Adulte DT2 déjà déclaré, hors DT1 et grossesse. Hors périmètre : la prévention du DT2 chez le sujet à
  risque / prédiabétique (mentionnée en argumentaire, ne pilote pas le nœud). Outil d'aide à la RECOMMANDATION :
  le médecin généraliste recommande, informe et oriente — il ne délivre pas le programme intensif.
selection: multi-options
argumentaire_exhaustif: "rhd.argumentaire.md"
criteres_entree:
  - nom: IMC
    type: nombre
  - nom: anciennete_diabete_annees
    type: nombre
  - nom: motivation
    type: bool
  - nom: capacite_activite
    type: bool
  - nom: alimentation_equilibree
    type: bool
  - nom: activite_physique_reguliere
    type: bool
  - nom: traitements_en_cours
    type: liste
    valeurs: [metformine, iSGLT2, aGLP1, tirzepatide, sulfamide, gliptine, insuline, glinide, pioglitazone]
options:
  - intitule: "Mesures hygiéno-diététiques — socle recommandé à tous (alimentation type méditerranéen, activité physique adaptée, objectif de perte de poids ≥ 5-10 % si surpoids/obésité)"
    conditions:
      - "toujours"
    priorite: 0
    avantages:
      - "Seul bénéfice sur critère CV DUR démontré parmi les MHD : le régime méditerranéen (2 ECR — PREDIMED en prévention primaire, CORDIOPREV en prévention secondaire, ~50 % de diabétiques dans les deux)."
      - "Améliore le contrôle glycémique (activité physique structurée : HbA1c ~−0,6 %) et retarde la mise sous hypoglycémiant (régime méditerranéen, Esposito)."
      - "L'alimentation et l'activité physique sont bénéfiques MÊME en l'absence de perte de poids (grade A, EBM Guidelines/ebmfrance) : à recommander à tous, comme fond permanent."
    inconvenients:
      - "Le bénéfice CV dur se limite au régime méditerranéen ; l'exercice et la restriction diététique n'ont démontré qu'un effet sur des substituts (HbA1c, poids, report du traitement)."
      - "L'intervention intensive sur le mode de vie n'a PAS réduit les événements cardiovasculaires ni la mortalité (Look AHEAD : critère 1aire neutre HR 0,95, essai arrêté pour futilité) — ne pas promettre un gain de survie."
    effet_attendu: >-
      Régime méditerranéen : événements CV majeurs HR 0,69 (huile d'olive) / 0,72 (noix) — PREDIMED (~52 % de
      diabétiques ; sous-groupe diabétique NON vérifiable en primaire, paywall) ; CORDIOPREV HR 0,72, NNT ~20 sur
      7 ans. Activité physique structurée : HbA1c −0,5 à −0,7 % (métas Umpierre/Boulé). Report de la 1re médication
      (Esposito HR 0,63 [0,51-0,86] ; 0,70 ajusté sur la perte de poids). Perte de poids 5-10 % : amélioration
      glycémique et des facteurs de risque CV (SFD/HAS/Prescrire) — bénéfice sur critères DURS non démontré.
    niveau_preuve: modere
  - intitule: "Perte de poids importante visée rémission — informer, recommander, orienter (accompagnement structuré, hors médecine générale)"
    conditions:
      - "IMC >= 27"
    priorite: 1
    avantages:
      - "Une perte de poids importante et maintenue peut induire une rémission du DT2 (HbA1c < 6,5 % sans hypoglycémiant ≥ 3 mois) chez une fraction substantielle des patients, d'autant plus que le diabète est récent."
      - "En médecine générale : informer le patient de cette possibilité (grade A, ebmfrance) et l'orienter vers un accompagnement structuré (diététicien, programme type substituts de repas / DiRECT) ; bénéfices métaboliques et sur les comorbidités (apnée du sommeil, mobilité)."
    inconvenients:
      - "La rémission est un critère de SUBSTITUTION, ÉRODABLE (DiRECT : 46 % à 1 an → 13 % à 5 ans ; en vie réelle ~67 % de rechute) et dépendant du maintien pondéral ; ce n'est PAS une guérison (surveillance métabolique à vie)."
      - "AUCUN essai ne démontre que la rémission (non chirurgicale) réduise les événements CV ou la mortalité (Look AHEAD neutre ; l'association rémission → événements de Gregg 2024 est OBSERVATIONNELLE, non causale)."
      - "Recommandation appuyée sur l'EBM (DiRECT/DIADEM-1, ebmfrance grade A) et ADA/EASD, AU-DELÀ de la reco officielle française : la SFD 2025 confine la rémission à la chirurgie et n'endosse pas la voie diète/TDR — DIVERGENCE signalée."
      - "Le médecin généraliste n'exécute pas le programme intensif : il recommande, informe et oriente."
    effet_attendu: >-
      Rémission ~46 % à 1 an, ~36 % à 2 ans, ~13 % à 5 ans (DiRECT) ; ~61 % à 1 an (DIADEM-1, DT2 ≤ 3 ans) ;
      dose-dépendante du maintien pondéral (~64 % de rémission si ≥ 10 kg maintenus). Probabilité d'autant plus
      élevée que le diabète est récent (< 6 ans) et la perte de poids importante (≥ 10-15 % / ≥ 10-15 kg ;
      Kanbour : la perte de poids est le prédicteur dominant). Au-delà de la fenêtre : viser l'amélioration du
      contrôle et l'allègement médicamenteux, pas la rémission.
    niveau_preuve: modere
argumentaire: >
  En médecine générale, ce nœud aide à formuler des recommandations hygiéno-diététiques adaptées au patient et
  à en présenter les bénéfices attendus — il ne prescrit pas une prestation. Les mesures hygiéno-diététiques
  (alimentation de type méditerranéen, activité physique adaptée, objectif de perte de poids 5-10 % en cas de
  surpoids) constituent le socle recommandé à tous et le 1er temps thérapeutique, quel que soit le traitement
  médicamenteux, dans une approche personnalisée, réaliste et non culpabilisante (HAS parcours obésité :
  objectif de poids individualisé, « la stabilisation du poids est déjà un succès », éviter les régimes
  restrictifs rigides ; éducation thérapeutique dès le diagnostic). Le seul bénéfice sur critère CARDIOVASCULAIRE DUR démontré parmi ces mesures est celui du
  régime méditerranéen (deux essais randomisés, PREDIMED en prévention primaire et CORDIOPREV en prévention
  secondaire, avec environ la moitié de diabétiques) ; l'activité physique et la restriction diététique
  n'améliorent que des critères de substitution (HbA1c ~−0,6 %, poids, report de la mise sous médicament), et
  l'intervention intensive sur le mode de vie n'a pas réduit les événements cardiovasculaires ni la mortalité
  dans le seul grand essai à critère dur (Look AHEAD, arrêté pour futilité) — aussi la perte de poids est-elle à
  présenter comme un objectif de contrôle et de qualité de vie, sans promesse de survie. Chez le patient en
  surpoids ou obèse (IMC ≥ 27), on informe en outre de la possibilité d'une rémission par une perte de poids
  importante (~46-61 % à 1 an dans DiRECT/DIADEM-1, surtout si le diabète est récent), en orientant vers un
  accompagnement structuré : la rémission reste un état de substitution, érodable (13 % à 5 ans), dépendant du
  maintien pondéral et sans bénéfice démontré sur les critères durs. Cette recommandation de rémission par la
  diète s'appuie sur l'EBM et sur ADA/EASD, au-delà de la position française (SFD 2025), qui confine la rémission
  à la chirurgie ; l'outil affiche les deux, divergence signalée. La chirurgie métabolique est rappelée comme
  option à discuter/orienter selon l'IMC (alerte), la décision relevant de soins spécialisés.
