  medicalement_geek:
    synthese: >-
      Couvre DiRECT (rémission ~46 % vs 4 % à 1 an) dans une ligne EBM anti-sur-traitement, cohérente avec
      Prescrire/Minerva : la rémission est un résultat intermédiaire prometteur, dont le bénéfice sur les
      complications cardiovasculaires reste à confirmer (rappel de la neutralité CV de Look AHEAD).
    lien: "https://www.medicalement-geek.com/2017/12/dragi-webdo-n163.html"
  prescrire:
    synthese: >-
      1er choix = mesures diététiques + activité physique, perte de 5-10 % du poids (Premiers Choix, actualisation
      2026) ; alimentation de type méditerranéen ; écarter les édulcorants intenses. En prévention du DT2, le
      mode de vie réduit l'incidence d'environ 30-55 %, mais sans bénéfice démontré sur la mortalité ni, à 15 ans
      (DPPOS), sur les complications micro-angiopathiques. Objectif = éviter/retarder les complications, pas la
      perte de poids ni l'HbA1c en soi. (Résumé — droit d'auteur ; réf. dans docs/decision/sources/prescrire-dt2.md,
      P1/P2/P9-P13.)
  reco_officielle:
    source: "SFD 2025 (Darmon, Méd Mal Métab 2025;19(8):630-662) ; HAS 2024 (Stratégie thérapeutique du DT2) ; HAS parcours surpoids-obésité de l'adulte ; ADA/EASD 2022 (Davies, Diabetes Care 2022;45(11):2753) ; EBM Guidelines/ebmfrance (grade A) ; Prescrire (Premiers Choix 2026)"
    position: >-
      Les mesures hygiéno-diététiques (alimentation, activité physique, éducation thérapeutique dès le diagnostic
      — ETP grade B USPSTF, HAS parcours obésité) sont la 1re ligne et le socle permanent, dans une approche
      personnalisée, réaliste et NON culpabilisante (« la stabilisation du poids est déjà un succès », éviter les
      régimes restrictifs rigides — HAS parcours obésité). Objectif de perte de poids : ≥ 5 % bénéfique (3-5 %
      réduisent déjà le risque métabolique, 5-10 % améliorent PA/lipides/glycémie — HAS/RBP FFN 2022 ; ≥ 5 %
      obésité — SFD), > 10 % pour le bénéfice hépatique (SFD, MASLD/MASH), 5-15 % « primary target » et rémission
      comme objectif (ADA/EASD). Régime de type méditerranéen recommandé (SFD). Chirurgie métabolique : IMC ≥ 40,
      ou ≥ 35 avec comorbidité sévère améliorable (le DT2 qualifie), après 6-12 mois de prise en charge médicale
      sans bénéfice suffisant, préparation ≥ 6 mois, parcours pluridisciplinaire (centre spécialisé de l'obésité),
      suivi à vie (HAS parcours obésité) ; la SFD 2025 ouvre en outre l'indication à IMC 30-34,9 au cas par cas.
      Décision en soins spécialisés.
    divergence: true
    explication: >-
      Consensus complet sur le socle hygiéno-diététique. Divergences : (1) AMPLEUR de la perte de poids (5 %
      HAS/SFD vs 5-15 % ADA/EASD) ; (2) VOIE de la rémission — l'EBM (DiRECT/DIADEM-1, ebmfrance grade A) et
      ADA/EASD soutiennent la rémission par la DIÈTE intensive, mais la SFD 2025 confine la rémission à la
      CHIRURGIE et n'endosse pas le remplacement total de l'alimentation (TDR cité seulement en préopératoire) ;
      (3) STATUT « objectif » de la rémission vs critère de substitution non validé sur critères durs
      (Prescrire/Minerva ; Look AHEAD neutre sur le cardiovasculaire). L'outil affiche la voie diététique
      (EBM) à côté de la reco officielle française (chirurgie), divergence signalée. La HAS 2024 (stratégie DT2)
      aborde la rémission (R.123, pour la relativiser) et la chirurgie (R.122) sans en faire des objectifs. NB :
      les recos SFD/ADA-EASD sont cosignées avec des liens d'intérêt industriels étendus (comme pour le nœud statine).
incertitudes:
  - "La rémission est un critère de SUBSTITUTION : aucun essai ne démontre qu'atteindre une rémission (non chirurgicale) réduise les événements CV ou la mortalité ; l'association rémission → événements (Gregg 2024, dans Look AHEAD) est observationnelle, confondue par indication."
  - "Durabilité faible : la rémission s'érode fortement (DiRECT 46 % → 13 % à 5 ans ; ~67 % de rechute en vie réelle), dépendante du maintien pondéral."
  - "Fenêtre de rémission : gate sur l'IMC seul (§8-2). L'ancienneté du diabète n'est PAS un prédicteur indépendant après ajustement sur la perte de poids (Kanbour, conclusion écologique), mais garde une plausibilité biologique (réserve β-cellulaire) — elle module donc le message, pas l'éligibilité."
  - "Objectif de perte de poids : porté par l'effet_attendu (≥ 5-10 % socle / ≥ 10-15 % rémission), pas par une variable d'entrée (§8-3)."
  - "Chirurgie (alerte) : le seuil 30-34,9 « au cas par cas après échec médical ≥ 12 mois » n'est PAS gaté par le moteur (le nœud H ne collecte pas d'indicateur de contrôle glycémique) ; l'alerte se déclenche sur IMC ≥ 35 et le message rappelle le cas 30-34,9."
  - "PREDIMED-Plus (régime méditerranéen hypocalorique + activité) : critère CV dur non encore publié ; PREDIMED reste entaché par sa rétractation/republication (2018)."
  - "Divergence de voie SFD (rémission = chirurgie) vs EBM/ADA-EASD (rémission par la diète) : arbitrage référent — l'outil affiche la voie EBM avec la divergence signalée (§8-6)."
alertes:
  - quand: "IMC >= 35"
    niveau: attention
    message: >-
      Penser à discuter une évaluation de CHIRURGIE MÉTABOLIQUE en soins spécialisés : indication à considérer si
      IMC ≥ 35 avec une comorbidité sévère améliorable (le DT2 qualifie) — HAS parcours obésité / SFD / DSS-II —
      APRÈS 6-12 mois de prise en charge médicale sans bénéfice suffisant (préparation ≥ 6 mois, parcours
      pluridisciplinaire / centre spécialisé de l'obésité, suivi à vie). La SFD 2025 ouvre aussi l'indication à
      IMC 30-34,9 au cas par cas. Preuve de rémission par ECR (STAMPEDE, Mingrone, ARMMS-T2D) ; bénéfice sur
      critères durs EXCLUSIVEMENT observationnel (SOS, Aminian, Fisher ; aucun ECR de mortalité/CV). La décision
      relève des soins spécialisés (hors outil).
  - quand: "IMC >= 27 AND anciennete_diabete_annees < 6"
    niveau: info
    message: >-
      Fenêtre favorable à la rémission (diabète récent, < 6 ans) : rémission ~46-61 % à 1 an si perte de poids
      importante et maintenue (DiRECT/DIADEM-1). La rémission n'est PAS une guérison (surveillance métabolique à
      vie ; rechute fréquente si reprise de poids).
  - quand: "IMC >= 27 AND anciennete_diabete_annees >= 6"
    niveau: info
    message: >-
      Diabète plus ancien (≥ 6 ans) : rémission moins probable ; viser d'abord l'amélioration du contrôle
      glycémique et l'allègement médicamenteux — le bénéfice de la perte de poids persiste indépendamment de la
      rémission.
  - quand: "alimentation_equilibree == true AND activite_physique_reguliere == true"
    niveau: info
    message: >-
      Mode de vie déjà optimisé (alimentation équilibrée + activité physique régulière) : marge de manœuvre
      hygiéno-diététique faible → renforcer / maintenir plutôt que « faire plus » ; le bénéfice additionnel des
      MHD est limité. Si le contrôle reste insuffisant, envisager d'autres leviers (nœuds B/C).
  - quand: "capacite_activite == false"
    niveau: info
    message: >-
      Adapter l'activité physique aux capacités (fractionnée, en position assise, supervisée) : toute activité
      compte, même sans perte de poids ; plusieurs séances courtes valent une longue.
  - quand: "motivation == false"
    niveau: info
    message: >-
      Adhésion à renforcer : négocier des objectifs modestes, concrets et mesurables (entretien motivationnel),
      inscrits dans le dossier et réévalués — plutôt que d'imposer un objectif ambitieux non tenu.
  - quand: "traitements_en_cours contient insuline OR traitements_en_cours contient sulfamide OR traitements_en_cours contient glinide"
    niveau: attention
    message: >-
      Sous insuline, sulfamide ou glinide, une perte de poids (et la réduction des apports) majore le risque
      d'HYPOGLYCÉMIE : anticiper l'allègement / la déprescription de ces agents (voir nœuds C / D / E).
  - quand: "default"
    niveau: info
    message: >-
      Sujet âgé, fragile ou dénutri : viser le maintien de la masse musculaire (apports protéiques, renforcement)
      et NE PAS imposer de restriction calorique agressive (risque de sarcopénie) ; individualiser l'objectif.
veille_liee: []
meta:
  date_revue: "2026-07-24"
  auteur: "Opus + référent (Thibault)"
  statut: brouillon
  version: "0.1"
  changelog:
    - date: "2026-07-24"
      auteur: "Opus + référent (Thibault)"
      resume: >-
        Encodage initial (brouillon v0.1) depuis le dossier de preuve H-rhd.md (5 agents A + red-team B1→B5 +
        OpenEvidence OE-H1→H5 + red-team primaire des essais OE + lecture directe HAS/SFD/ebmfrance/Prescrire).
        Nœud recadré « outil d'aide à la recommandation » (médecine générale) : 2 options (socle MHD toujours ;
        perte de poids renforcée visée rémission si IMC ≥ 27) + 8 alertes (chirurgie « y penser » ; modulation
        de la probabilité de rémission par l'ancienneté ; marge de manœuvre ; activité adaptée ; motivation ;
        hypoglycémie sous insuline/SU/glinide ; sujet âgé/fragile). Décisions référent §8-1→8-7. Voie
        diète-rémission (EBM) affichée avec divergence SFD signalée. Guide HAS parcours obésité intégré
        (classes I/II/III, objectif personnalisé non culpabilisant, ETP dès le diagnostic, prérequis chirurgie
        6-12 mois). Argumentaire niveau 3 écrit (rhd.argumentaire.md). Vérification d'encodage bi-agents (étape 8)
        FAITE : Agent A fidélité (0 HAUTE ; M1 PREDIMED sous-groupe/HR par bras, M2 Esposito 0,63/0,70, M3
        « exclusivement » observationnel, B2 références ajoutées, B3 nuance HAS 2024 — corrigés) + Agent B red-team
        moteur (18 profils tracés, 0 HAUTE / 0 MOYENNE / 2 BASSE documentées). RESTE : validation clinique finale
        du référent → passage `valide` + commit.
