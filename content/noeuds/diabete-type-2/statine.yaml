  medicalement_geek:
    synthese: >-
      Ligne EBM francophone (Prescrire, Minerva, RecoMédicales, Louvain Médical) : dose fixe de statine calée
      sur le risque absolu, pas de cible LDL dogmatique ; en prévention primaire, décider sur le risque
      cardiovasculaire global, pas sur les chiffres lipidiques ; réserver la haute intensité à la prévention
      secondaire.
    lien: "https://recomedicales.fr/recommandations/statines/"
  prescrire:
    synthese: >-
      Prévention secondaire = bénéfice net clair. Prévention primaire = seulement selon le risque absolu
      (âge > 40 ans + autres indicateurs de risque cardiovasculaire), pas systématique ; dose modérée fixe,
      pas de cible LDL dogmatique, molécule préférée = simvastatine (la mieux évaluée). (Résumé — droit
      d'auteur ; position éditoriale constante ; réf. Rev Prescrire, « Diabète de type 2 : une statine pour
      certains patients », juillet 2005 — texte réservé aux abonnés.)
  reco_officielle:
    source: >-
      Recommandation française à jour : SFE/SFD/NSFA/SFC 2026 « Management of dyslipidemia in adults »
      (Diabetes & Metabolism 2026;52:101725 — consensus multi-sociétés, SFD incluse) ; ESC/EAS 2019 (Mach,
      Eur Heart J 2020;41:111-188) + ESC 2023 diabète ; ADA Standards of Care 2026 (chap. 10) ; SCORE2-Diabetes
      (Eur Heart J 2023;44:2544). NB (vérifié sur les PDF locaux) : ni la HAS 2024 « Stratégie thérapeutique du
      DT2 » ni la prise de position SFD 2025 (hyperglycémie) ne traitent de la statine ; la reco HAS 2017
      dyslipidémies est supplantée par la reco française 2026.
    position: >-
      Le diabétique est stratifié — jamais « bas risque » — en risque MODÉRÉ (DT2 < 10 ans non compliqué),
      ÉLEVÉ ou TRÈS ÉLEVÉ selon une grille de facteurs cliniques (durée, complications micro/macrovasculaires,
      ACR/DFG, LDL > 1,9 g/L, insuffisance cardiaque / fibrillation atriale, HVG, AOMI ≥ 50 %…), SCORE2-Diabète
      servant aux 40-69 ans non compliqués. Statine en 1re intention ; intensité et cible LDL par catégorie :
      modéré → statine d'intensité modérée, cible LDL < 1,0 g/L, l'initiation relevant d'une DÉCISION PARTAGÉE
      si le LDL reste au-dessus de la cible malgré les mesures hygiéno-diététiques ; élevé → < 0,70 g/L ; très
      élevé → < 0,55 g/L + escalade ézétimibe puis anti-PCSK9. Ancrage d'efficacité (CTT) : −21 % d'événements
      CV majeurs et −10 % de mortalité toutes causes par mmol/L (0,39 g/L) de LDL abaissé (−21 % confirmé chez
      le diabétique). Prévention primaire > 75 ans : cible non fondée sur le risque (espérance de vie /
      fragilité ; statine utile ≥ 2,5 ans → ne pas initier si espérance de vie < 2,5 ans). Dialyse : bénéfice
      non démontré (4D, AURORA).
    divergence: true
    explication: >-
      La reco française 2026 est en réalité PROCHE de la position de l'outil sur plusieurs points : elle
      reconnaît explicitement l'ABSENCE d'ECR définissant des cibles LDL (« despite the absence of randomized
      controlled trials defining specific LDL-c targets »), encadre l'initiation au risque modéré par une
      DÉCISION PARTAGÉE, et individualise le sujet > 75 ans (espérance de vie ≥ 2,5 ans). Divergence résiduelle
      de l'outil : (1) il ne PILOTE pas la décision par une cible LDL chiffrée (dose fixe selon le risque —
      LODESTAR : viser une cible ≡ dose fixe ; VA/DoD 2026 : preuve insuffisante pour le treat-to-target) ;
      (2) en prévention PRIMAIRE, il affiche que le bénéfice porte sur les ÉVÉNEMENTS CV et NON sur une
      réduction démontrée de la mortalité totale chez le diabétique (CARDS p=0,059 ; essais dédiés NS).
      L'escalade ézétimibe / anti-PCSK9 (cible non atteinte) est hors périmètre de ce nœud « statine ».
      ⚠ CONFLITS D'INTÉRÊT : la reco française 2026 (comme ses homologues ESC/ADA/ACC-AHA) est cosignée par des
      experts aux liens industriels étendus avec les fabricants d'hypolipémiants / anti-PCSK9 (Amgen,
      Sanofi-Regeneron, Novartis, Novo Nordisk, AstraZeneca, MSD…). Ce biais pèse surtout sur le versant
      AGRESSIF (cibles LDL très basses, escalade PCSK9), non sur le socle « statine chez le diabétique à
      risque » qui reste solidement EBM. Pour le GRAIN de la décision (dose fixe vs cible, honnêteté sur la
      mortalité), l'outil s'aligne sur l'EBM (CTT, CARDS, LODESTAR, VA/DoD 2026) et les sources critiques
      INDÉPENDANTES (Prescrire, Minerva).
incertitudes:
  - "Mortalité toutes causes en prévention primaire du DT2 : NON démontrée (essais dédiés au diabète non significatifs ; le signal vient des méta-analyses mixtes primaire + secondaire) — l'outil affiche le bénéfice sur les événements CV, pas sur la survie."
  - "Frontière « discuter / traiter » = jugement de valeur, pas un seuil-EBM : le bénéfice relatif de la statine est ~constant (CTT), seul le bénéfice absolu décroît avec le risque. L'outil place la frontière à l'absence des facteurs d'enrichissement des ECR (CARDS/HPS : ≥ 1 FDR, complication, ancienneté ≥ 10 ans), alignée sur la grille française 2026 (« modéré = DT2 < 10 ans non compliqué »)."
  - "`diabete_complique` (bool) = jugement clinique (atteinte d'organe rétinienne / rénale / neurologique, ou maladie macrovasculaire) ; la grille française 2026 détaille les critères (ACR/DFG, rétinopathie sévère…), non éclatés ici pour rester lisible et EBM."
  - "SCORE2-Diabète = aide à l'estimation du risque absolu (seuils fixes ESC 2023, validé 40-69 ans), affichée en alerte info, NON encodée comme gate (un seuil % serait un artefact de modèle, pas une donnée d'ECR — l'ancien encodage âge-bandé était une erreur méthodo corrigée)."
  - "Prévention primaire après 75 ans : preuve faible/incertaine (STAREE — qui exclut les diabétiques — et PREVENTABLE en cours) ; modélisée en alerte plutôt qu'en option distincte."
  - "Exception dialyse modélisée par une alerte sur la variable `dialyse` (bool) — elle ne retire pas l'option (le clinicien juge la poursuite d'une statine déjà en place)."
  - "Cible LDL en prévention secondaire / très haut risque : évolutive (ECR 2026 de ciblage intensif via ézétimibe / anti-PCSK9) — hors périmètre du nœud statine, à suivre en veille."
  - "Conflits d'intérêt des recommandations officielles (reco française 2026 & homologues internationales cosignées avec les fabricants d'hypolipémiants / anti-PCSK9) : signalés dans reco_officielle ; l'outil pondère l'EBM et les sources critiques indépendantes (Prescrire, Minerva) pour le grain de la décision, surtout sur le versant agressif (cibles, escalade)."
