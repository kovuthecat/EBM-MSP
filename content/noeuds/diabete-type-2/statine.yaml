# Nœud F « Statine chez le diabétique » — contenu VALIDÉ (2026-07-23).
# Autorité : docs/decision/noeuds/F-statine.md (dossier de preuve : agents A × red-team B (essais + reco) ×
# OpenEvidence OE-F1→F5, PMID/DOI vérifiés contre source primaire) + .argumentaire.md (niveau 3). VALIDÉ
# référent (Thibault) + vérifié bi-agents (pipeline étape 8, feu vert : 0 finding HAUTE). Les valeurs cliniques
# ne se modifient pas hors workflow veille → algorithme (D5).
#
# NŒUD ORDERED-FIRST-MATCH (D11) : sortie UNIQUE, échelle de risque — le patient relève d'UN tier, la 1re
# option satisfaite dans l'ordre l'emporte, le `default` en dernier. `priorite` ignoré dans ce mode.
# ORTHOGONAL aux nœuds glycémiques (A/B/C/D/E) : la statine se décide INDÉPENDAMMENT de l'HbA1c et du
# traitement antidiabétique. `prevention` n'est PAS une variable : prévention secondaire ⟺ ASCVD_etablie
# (une seule source de vérité, cf. dossier §1). Pas de critère LDL : la statine est indiquée indépendamment
# du LDL de base (HPS) et l'outil ne pilote pas par une cible chiffrée (position « pas de cible dogmatique »).
# STRATIFICATION du risque en prévention primaire par des FACTEURS ANCRÉS SUR LES ECR (CARDS/HPS), alignés sur
# la grille française 2026 (v0.3, « que dit l'EBM ») : diabète NON compliqué + RÉCENT (< 10 ans) + SANS autre
# FDR = risque faible → décision partagée ; sinon (≥ 1 FDR OU diabète compliqué OU ancienneté ≥ 10 ans) →
# traiter. Fondement EBM : le bénéfice relatif de la statine est ~constant quel que soit le risque (CTT), donc
# il n'existe PAS de seuil-EBM ; la population PROUVÉE est celle des ECR (CARDS = 40-75 ans + ≥ 1 FDR ; ASPEN,
# plus bas risque, est nul). SCORE2-Diabète = AIDE à l'estimation du risque absolu (alerte info, seuils FIXES
# ESC 2023, validé 40-69 ans), PAS un gate (un seuil % serait un artefact de modèle, pas une donnée d'ECR ;
# l'ancien encodage â­ge-bandé était une erreur méthodo — red-team). 3 ALERTES (D15) : > 75 ans en prévention
# primaire = individualiser ; dialyse (bool) = ne pas INITIER ; rappel « risque absolu, pas de cible LDL ».
# DÉFINITIONS (validées référent 2026-07-23) : `diabete_complique` (bool) = toute atteinte d'organe cible
# (rétinopathie, néphropathie / albuminurie, neuropathie) OU maladie macrovasculaire non-ASCVD ; `autres_FDRCV`
# = compte des facteurs de risque CV additionnels (HTA, tabac, dyslipidémie, hérédité CV précoce…). Libellés
# d'intensité (Table 4 SFE/SFD/NSFA/SFC 2026) : haute = atorva 40-80 / rosuva 10-20 ; modérée = atorva 10-20 /
# simva 20-40 / prava 40.
# ⚠ MESSAGES À NE JAMAIS TENIR (dossier §5d) : la statine ne « réduit pas la mortalité toutes causes » en
# prévention primaire du DT2 (non démontré — événements CV seulement) ; ne pas transformer une cible LDL de
# guideline en objectif dur ; ne pas initier en dialyse ; le « diabète induit par statine » est SANS OBJET
# chez un patient déjà diabétique.
id: statine
domaine: diabete-type-2
titre: "Prescrire une statine (et à quelle intensité) chez le diabétique de type 2"
population_cible: >-
  Adulte DT2, hors DT1 et grossesse (statines contre-indiquées pendant la grossesse). Décision du volet
  lipidique de la prévention cardiovasculaire, indépendante de l'HbA1c et du traitement antidiabétique.
  Hors périmètre : hypercholestérolémie familiale (prise en charge spécifique) et intensification par
  ézétimibe / anti-PCSK9 si la cible n'est pas atteinte sous statine maximale tolérée (au-delà de ce nœud).
selection: ordered-first-match
argumentaire_exhaustif: "statine.argumentaire.md"
criteres_entree:
  - nom: age
    type: nombre
  - nom: ASCVD_etablie
    type: bool
  - nom: anciennete_diabete_annees
    type: nombre
  - nom: autres_FDRCV
    type: nombre
  - nom: diabete_complique
    type: bool
  - nom: dialyse
    type: bool
options:
  - intitule: "Statine de haute intensité — prévention secondaire (maladie athéromateuse établie)"
    conditions:
      - "ASCVD_etablie == true"
    avantages:
      - "Bénéfice sur critères DURS (mortalité, IDM, AVC, revascularisation), à NNT bas car le risque de base est élevé : événements vasculaires majeurs RR ~0,79 par 1 mmol/L de LDL abaissé chez le diabétique (méta CTT 2008, effet identique aux non-diabétiques) ; NNT ~12-20 sur 5-6 ans dans les sous-groupes de prévention secondaire (CARE, HPS, LIPID)."
      - "Haute intensité justifiée : gain incrémental démontré sur les événements CV non fatals (CTT more-vs-less 2010 : −15 % ; TNT sous-groupe diabète HR 0,75, NNT ~24 sur 4,9 ans)."
    inconvenients:
      - "L'INTENSIFICATION (haute vs modérée) ne réduit PAS la mortalité toutes causes (TNT cohorte totale HR 1,01 ; IDEAL et SEARCH non significatifs sur leur critère principal) : le gain de la haute intensité porte sur les événements CV, pas sur la survie — le bénéfice de mortalité vient de « statine vs rien »."
      - "Risque résiduel majeur (HPS : ~78 % des événements vasculaires majeurs non prévenus). Surcroît de myopathie à très haute dose (simvastatine 80 mg — à éviter, restriction FDA)."
    effet_attendu: >-
      Événements vasculaires majeurs RR ~0,79 par 1 mmol/L de LDL abaissé (CTT diabète) ; NNT ~12-20 sur
      5-6 ans en prévention secondaire (CARE NNT ~12 ; HPS ~20 ; LIPID ~18/6 ans, critère 1aire du sous-groupe
      NS). Intensification haute vs modérée : −15 % d'événements supplémentaires (CTT more-vs-less, NNT ~25 sur
      5 ans). Mortalité : réduite par la statine elle-même, PAS par l'intensification seule (TNT HR 1,01).
    niveau_preuve: eleve
    contre_indications:
      - "Molécules de haute intensité (baisse de LDL ≥ 50 %, SFE/SFD/NSFA/SFC 2026 Table 4) : atorvastatine 40-80 mg ou rosuvastatine 10-20 mg. Prudence d'interaction via le CYP3A4 avec l'atorvastatine (macrolides, azolés, amiodarone, vérapamil/diltiazem, inhibiteurs de protéase) ; préférer la rosuvastatine en cas de co-prescription à risque."
      - "Ne pas INITIER de statine chez un patient déjà en dialyse (bénéfice non démontré — voir alerte) ; grossesse."
  - intitule: "Discuter la statine (décision partagée) — diabète non compliqué à faible risque absolu"
    conditions:
      - "anciennete_diabete_annees < 10"
      - "autres_FDRCV == 0"
      - "diabete_complique == false"
    avantages:
      - "Diabète RÉCENT (< 10 ans), NON compliqué (pas d'atteinte d'organe rétinienne / rénale / neurologique ni de maladie macrovasculaire) et SANS autre facteur de risque cardiovasculaire : le risque absolu est faible, en-deçà des populations où le bénéfice a été démontré par ECR (CARDS a inclus des diabétiques 40-75 ans AVEC ≥ 1 facteur de risque ; ASPEN, à plus bas risque, est nul). Le bénéfice ABSOLU d'une statine y est faible → décision partagée plutôt qu'automatisme."
    inconvenients:
      - "Le bénéfice RELATIF des statines est ~constant quel que soit le risque (CTT : ~21 % par mmol/L, même à bas risque — CTT 2012) ; c'est le bénéfice ABSOLU, faible ici, qui justifie la décision partagée."
      - "Réévaluer à chaque consultation : une ancienneté qui atteint 10 ans, l'apparition d'un facteur de risque ou d'une complication font basculer vers le traitement. SCORE2-Diabète (voir rappel) aide à estimer le risque absolu."
    effet_attendu: >-
      Bénéfice absolu faible à ce niveau de risque (peu d'événements évités pour 1000 patients traités) ;
      aucune donnée de mortalité. La reco française 2026 classe ce profil « risque modéré » et fait de
      l'initiation une décision partagée si le LDL reste au-dessus de la cible malgré les mesures d'hygiène.
    niveau_preuve: faible
  - intitule: "Statine (prévention primaire, intensité modérée — haute si risque très élevé)"
    conditions:
      - "default"
    avantages:
      - "Diabétique en prévention primaire à risque non négligeable — ≥ 1 facteur de risque CV additionnel, OU diabète compliqué (atteinte d'organe), OU diabète ancien (≥ 10 ans) : population où la statine réduit de façon ROBUSTE les événements CV majeurs (CARDS : composite HR 0,63, NNT ~27-32 sur ~4 ans ; sous-groupe prévention primaire du HPS RRR 33 %, NNT ~22 sur 5 ans ; méta CTT). La reco française 2026 les classe « risque élevé / très élevé »."
      - "Intensité MODÉRÉE en 1re intention (atorvastatine 10-20 mg, ou simvastatine / pravastatine — dose fixe calée sur le risque), sans course à une cible LDL chiffrée (voir alerte)."
    inconvenients:
      - "La réduction de la MORTALITÉ TOTALE n'est PAS démontrée en prévention primaire chez le diabétique (CARDS : HR 0,73 p=0,059 NS ; méta des essais dédiés au diabète non significative ; ASPEN nul) : le bénéfice porte sur les événements CV, à présenter honnêtement."
      - "Intensité HAUTE réservée au risque très élevé (multiples facteurs de risque, atteinte d'organe) ; sinon la dose modérée suffit (Prescrire ; LODESTAR : viser une cible ≡ dose fixe)."
    effet_attendu: >-
      Événements CV majeurs : NNT de l'ordre de ~22-37 sur 3-5 ans selon le risque de base (CARDS ~27-32 sur
      3,9 ans ; sous-groupe prévention primaire du HPS ~22 sur 5 ans). Mortalité toutes causes : NON démontrée
      en prévention primaire du DT2 (le signal de mortalité provient des méta-analyses mixtes prévention
      primaire + secondaire, porté par le secondaire).
    niveau_preuve: modere
    contre_indications:
      - "Molécule d'intensité modérée en 1re intention : atorvastatine 10-20 mg, ou simvastatine 20-40 mg / pravastatine 40 mg (mieux évaluées, moins d'interactions — position EBM). Escalade vers la haute intensité si le risque est très élevé."
      - "Ne pas INITIER de statine chez un patient déjà en dialyse (voir alerte) ; grossesse."
alertes:
  - quand: "age > 75 AND ASCVD_etablie == false"
    niveau: attention
    message: >-
      Prévention primaire après 75 ans : preuve plus faible et moins directe (méta CTT par âge 2019 ;
      PROSPER : sous-groupe prévention primaire non significatif, pas de bénéfice de mortalité). Individualiser
      selon l'espérance de vie, la fragilité et les préférences (délai avant bénéfice estimé ~2,5 ans). En
      prévention secondaire (ASCVD établie), le bénéfice de la statine persiste à tout âge.
  - quand: "dialyse == true"
    niveau: attention
    message: >-
      Patient en dialyse : ne pas INITIER une statine — bénéfice non démontré sur les critères durs chez le
      dialysé (4D chez le DT2 hémodialysé : critère principal RR 0,92 NS, avec un signal d'AVC fatal ;
      AURORA : neutre malgré −43 % de LDL). Si une statine est déjà en place, sa poursuite est raisonnable.
      En maladie rénale chronique NON dialysée, la statine reste indiquée (le patient relève des options ci-dessus).
  - quand: "default"
    niveau: info
    message: >-
      La décision (traiter / discuter) et l'intensité se gradent sur le RISQUE ABSOLU, pas sur une cible LDL
      chiffrée : aucun ECR ne valide une valeur cible de LDL (LODESTAR : viser une cible ≡ dose fixe ; VA/DoD
      2026 : preuve insuffisante pour le treat-to-target), et le bénéfice est indépendant du LDL de base (HPS).
      Pour estimer le risque absolu chez le diabétique NON compliqué de 40-69 ans, l'outil SCORE2-Diabète est
      utile (seuils fixes ESC 2023 : faible < 5 %, modéré 5-<10 %, haut 10-<20 %, très haut ≥ 20 %) ; il n'est
      pas validé chez le diabétique compliqué (d'emblée à haut risque) ni au-delà de 69 ans (SCORE2-OP /
      jugement clinique).
argumentaire: >
  La statine est le volet lipidique de la prévention cardiovasculaire du diabétique, à décider indépendamment
  de l'HbA1c. En prévention SECONDAIRE (maladie athéromateuse établie), le bénéfice est fort, sur critères
  durs, à NNT bas (méta CTT : −21 % d'événements vasculaires majeurs par mmol/L de LDL abaissé, effet
  identique chez le diabétique et le non-diabétique ; NNT ~12-20 sur 5 ans), et la haute intensité apporte un
  gain incrémental réel mais plus modeste (CTT more-vs-less −15 % ; TNT diabète HR 0,75) — sans réduction de
  la mortalité par l'intensification seule (TNT cohorte totale HR 1,01). En prévention PRIMAIRE, le bénéfice
  sur les événements CV majeurs est solide (CARDS, seul grand ECR dédié : composite HR 0,63, NNT ~27-32 ;
  sous-groupe primaire du HPS RRR 33 %), mais modeste en absolu et — point de vigilance anti-sur-traitement —
  la réduction de la MORTALITÉ TOTALE n'est PAS démontrée dans les essais conçus pour le diabète (CARDS
  p=0,059 NS ; méta dédiée non significative ; ASPEN nul) : le signal de mortalité provient des méta-analyses
  mixtes, portées par la prévention secondaire. D'où une décision graduée par le RISQUE ABSOLU : statine
  quasi systématique en prévention secondaire (haute intensité) ; en prévention primaire, statine d'intensité
  modérée pilotée par le risque (≥ 40 ans, ou plus jeune avec facteurs de risque / diabète ancien), et
  décision partagée chez le sujet jeune à bas risque où le bénéfice absolu est faible. Position critique
  assumée : l'intensité est calée sur le niveau de risque, PAS sur une cible LDL chiffrée — aucun ECR ne
  valide une valeur cible (LODESTAR : viser une cible équivaut à une dose fixe), et CARDS/HPS ont démontré le
  bénéfice à dose fixe, indépendamment du LDL de base. Cas particuliers : après 75 ans en prévention primaire,
  individualiser (preuve faible) ; ne pas initier de statine chez un patient déjà en dialyse (4D, AURORA
  neutres). Le « diabète induit par statine » est sans objet chez un patient déjà diabétique.
